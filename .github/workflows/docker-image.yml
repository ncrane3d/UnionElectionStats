name: Deploy Shiny App

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Internal Port to map (usually 3838)'
        required: true
        default: '3838'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }} # Passes the exact tag to the deploy job
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase the repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Union Election Stats Deployment
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e # Terminate script if any command fails
            
            # Use lowercase repo name to match registry
            REPO_PATH="${{ github.repository }}"
            REPO_PATH_LC=$(echo "$REPO_PATH" | tr '[:upper:]' '[:lower:]')
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Use the output from the build job to ensure tag consistency
            TAG="${{ needs.build-and-push.outputs.image_tag }}"
            IMAGE="ghcr.io/$REPO_PATH_LC:$TAG"
            CONTAINER_NAME="unionelectionstats"
            
            # Use 127.0.0.1 to hide the port from the public internet
            HOST_PORT="${{ github.event.inputs.port || '3838' }}"

            echo "Deploying $IMAGE on 127.0.0.1:$HOST_PORT..."

            docker pull $IMAGE

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              --memory="11g" \
              --memory-swap="11g" \
              -e GMAIL_PASS="${{ secrets.GMAIL_PASS }}" \
              -p 127.0.0.1:$HOST_PORT:3838 \
              $IMAGE

            docker image prune -f
