name: Deploy Shiny App

on:
  workflow_dispatch:
    inputs:
      port:
        description: 'Internal Port to map'
        required: true
        default: '3838'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Lowercase the repo name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO_LC }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        id: build # This ID allows the outputs to find the digest
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Union Election Stats Deployment
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            
            IMAGE_BASE="ghcr.io/${{ github.repository }}"
            IMAGE_BASE_LC=$(echo "$IMAGE_BASE" | tr '[:upper:]' '[:lower:]')
            FULL_IMAGE="${IMAGE_BASE_LC}@${{ needs.build-and-push.outputs.image_digest }}"
            
            CONTAINER_NAME="unionelectionstats"
            HOST_PORT="${{ github.event.inputs.port || '3838' }}"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Force pulling specific digest: $FULL_IMAGE"
            docker pull $FULL_IMAGE

            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true

            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              --memory="11g" \
              --memory-swap="11g" \
              -e GMAIL_PASS="${{ secrets.GMAIL_PASS }}" \
              -p 127.0.0.1:$HOST_PORT:3838 \
              $FULL_IMAGE

            docker image prune -af
